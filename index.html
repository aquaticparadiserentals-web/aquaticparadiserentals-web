<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#0B1E2D"/>
<link rel="manifest" href="manifest.json"/>
<title>Aquatic Paradise Rentals</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#03939E;--td:#02707A;--tl:#E9F6F7;
  --gold:#FBC62C;--coral:#E0351B;--navy:#0B1E2D;--n2:#10293D;
  --green:#1B8A4C;--gl:#E3F5EC;
  --bg:#FAFAF7;--card:#fff;--txt:#11242E;--mut:#5C7680;--brd:#E4ECE9;
  --serif:'Cormorant Garamond',serif;--sans:'Outfit',sans-serif;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none}
input,select,textarea{font-family:var(--sans);font-size:15px}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.fade{animation:fadeIn .3s ease}
#app{min-height:100vh;display:flex;flex-direction:column}
.hdr{background:linear-gradient(180deg,var(--n2),var(--navy));position:sticky;top:0;z-index:40;border-bottom:1px solid rgba(251,198,44,.15)}
.hdr-inner{max-width:1100px;margin:0 auto;padding:12px 16px 0;padding-top:max(12px,env(safe-area-inset-top))}
.hdr-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.hdr-logo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);flex-shrink:0}
.hdr-name{font-family:var(--serif);font-size:17px;font-weight:600;color:#fff;line-height:1.1}
.hdr-role{font-size:9.5px;color:var(--gold);text-transform:uppercase;letter-spacing:.12em;margin-top:2px}
.logout-btn{margin-left:auto;padding:7px 13px;border-radius:9px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);font-size:11.5px;font-weight:600}
.tab-bar{display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:10px 14px;border-radius:8px 8px 0 0;border:none;background:transparent;color:rgba(255,255,255,.55);font-family:var(--sans);font-size:11.5px;font-weight:500;white-space:nowrap;transition:all .15s;cursor:pointer}
.tab-btn.active{background:var(--bg);color:var(--teal);font-weight:700}
.main{max-width:1100px;margin:0 auto;padding:22px 16px 80px;width:100%}
.card{background:var(--card);border-radius:15px;padding:20px;margin-bottom:14px;border:1px solid var(--brd);box-shadow:0 1px 3px rgba(11,30,45,.03),0 6px 20px rgba(11,30,45,.04)}
.page-title{font-family:var(--serif);font-size:22px;font-weight:600;color:var(--navy);margin-bottom:14px}
.section-title{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--navy);margin-bottom:12px}
label.lbl{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-bottom:6px;margin-top:14px}
.inp{width:100%;padding:11px 13px;border:1.5px solid var(--brd);border-radius:10px;color:var(--txt);background:#fdfdfb;transition:border-color .15s;outline:none}
.inp:focus{border-color:var(--teal)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:70px}
.btn{padding:13px 22px;border-radius:11px;font-weight:600;font-size:14.5px;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:active{background:var(--td)}
.btn-secondary{background:#fff;color:var(--td);border:1.5px solid var(--teal)}
.btn-danger{background:var(--coral);color:#fff}
.btn-full{width:100%;justify-content:center}
.btn-sm{padding:8px 14px;font-size:12.5px;border-radius:9px}
.btn-wa{background:#25D366;color:#fff;text-decoration:none}
.step-bar{display:flex;gap:1px;border-radius:11px;overflow:hidden;border:1px solid var(--brd);margin-bottom:18px}
.step-item{flex:1;padding:11px 6px;text-align:center;font-size:10px;font-weight:600;background:#fff;color:var(--mut);border-right:1px solid var(--brd);transition:all .2s}
.step-item.active{background:var(--teal);color:#fff}
.step-item.done{background:var(--td);color:#fff}
.total-bar{background:linear-gradient(135deg,var(--n2),var(--navy));color:#fff;border-radius:13px;padding:14px 18px;margin:14px 0;display:flex;justify-content:space-between;align-items:center}
.total-lbl{font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.total-amt{font-family:var(--serif);font-size:24px;font-weight:600}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.bg-gold{background:#FFF3D6;color:#92670A}.bg-blue{background:#DCEEFF;color:#0A5FA8}
.bg-green{background:#E3F5EC;color:#0A6A3A}.bg-red{background:#FBE0E0;color:#A8200A}
.bg-teal{background:var(--tl);color:var(--td)}.bg-navy{background:var(--gold);color:var(--navy)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
#toast-wrap{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px;pointer-events:none}
.toast{padding:12px 16px;border-radius:12px;color:#fff;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.25);animation:slideIn .25s ease;display:flex;gap:8px;align-items:center;pointer-events:auto;cursor:pointer}
.t-ok{background:var(--green)}.t-warn{background:#B8940E}.t-error{background:var(--coral)}
.modal-bg{position:fixed;inset:0;background:rgba(11,30,45,.75);z-index:8888;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.4);animation:fadeIn .25s ease}
.modal-box.wide{max-width:820px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:var(--serif);font-size:20px;color:var(--navy);font-weight:600}
.modal-close{background:none;border:none;font-size:22px;color:var(--mut);cursor:pointer;padding:0 4px;line-height:1}
.id-drop{border:2px dashed var(--brd);border-radius:12px;padding:20px;text-align:center;cursor:pointer;background:#fdfdfb;transition:border-color .2s}
.id-drop:hover{border-color:var(--teal)}
.waiver-box{border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-bottom:14px}
.waiver-hdr{padding:10px 16px;font-weight:600;font-size:13px;color:#fff;background:var(--navy)}
.waiver-body{padding:14px;font-size:11.5px;line-height:1.75;max-height:150px;overflow-y:auto;background:#fdfdfb;color:var(--txt);white-space:pre-wrap}
.waiver-check{display:flex;align-items:center;gap:10px;padding:12px 16px;background:#fff;border-top:1px solid var(--brd);font-size:13px;cursor:pointer}
.equip-card{background:#fff;border-radius:13px;padding:16px;border:1.5px solid var(--brd)}
.equip-bar-wrap{height:6px;background:var(--brd);border-radius:3px;overflow:hidden;margin-top:6px}
.equip-bar{height:100%;border-radius:3px;transition:width .4s}
.bk-card{background:#fff;border-radius:13px;padding:16px;margin-bottom:12px;border:1px solid var(--brd);box-shadow:0 1px 6px rgba(11,30,45,.04)}
#login{min-height:100vh;background:linear-gradient(160deg,var(--n2),var(--navy) 60%,var(--td));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-box{background:rgba(255,255,255,.07);border-radius:20px;padding:26px;width:100%;max-width:320px;border:1px solid rgba(255,255,255,.1)}
.pin-dots{display:flex;justify-content:center;gap:10px;margin:16px 0}
.pin-dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.2);transition:background .15s}
.pin-dot.filled{background:var(--gold)}
.numpad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.num-key{padding:14px;border-radius:11px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.07);color:#fff;font-size:18px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.num-key:active{background:rgba(255,255,255,.2)}
.num-del{background:rgba(224,53,27,.3)}
.num-enter{width:100%;padding:13px;border-radius:11px;border:none;background:var(--gold);color:var(--navy);font-weight:700;font-size:15px;font-family:var(--sans);transition:opacity .2s}
.stat-card{background:#fff;border-radius:13px;padding:18px;border-left:4px solid var(--teal);box-shadow:0 1px 6px rgba(11,30,45,.05)}
.stat-val{font-family:var(--serif);font-size:24px;font-weight:600}
.stat-lbl{font-size:10.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.notif-banner{background:var(--tl);border:1px solid var(--teal);border-radius:11px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:var(--td)}
.toggle-wrap{width:42px;height:23px;border-radius:12px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle-knob{position:absolute;top:3px;width:17px;height:17px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.staff-card{background:#fff;border-radius:13px;padding:16px;margin-bottom:12px;border:1px solid var(--brd)}
@media(max-width:500px){.g2{grid-template-columns:1fr}}
</style>
</head>

function today(){return new Date().toISOString().split('T')[0];}

function fmtDate(d){try{return new Date(d+'T12:00').toLocaleDateString('en-VC',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}
function fmt(n){return n===0?'FREE':BIZ.currency+' $'+Number(n).toFixed(2);}
function addHrs(t,h){const[hr,mn]=t.split(':').map(Number);return String((hr+h)%24).padStart(2,'0')+':'+String(mn).padStart(2,'0');}
function cp(p){return p.replace(/[^0-9]/g,'');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,type='ok'){

function bkStep(n){BK.step=n;renderBooking();}
function bkN1(){if(!BK.fn||!BK.ln||!BK.phone){toast('Name and phone required','error');return;}if(!BK.idData){toast('Photo ID is required','error');return;}bkStep(2);}

function renderCiList(bks,q){
  const f=bks.filter(b=>(b.fn+b.ln+b.id+b.eName).toLowerCase().includes(q.toLowerCase()));
  if(!f.length)return`<div style="text-align:center;padding:48px;color:var(--mut)">No bookings for today yet.</div>`;
  return f.map(b=>{
    const acts=[];
    if(b.status==='confirmed'){acts.push(`<button class="btn btn-sm" style="background:var(--teal);color:#fff" onclick="doCI('${b.id}')">✅ Check In</button>`);acts.push(`<button class="btn btn-sm btn-danger" onclick="doCancel('${b.id}')">Cancel</button>`);}
    if(b.status==='checked-in')acts.push(`<button class="btn btn-sm" style="background:var(--green);color:#fff" onclick="doReturn('${b.id}')">📦 Return</button>`);
    if(b.phone)acts.push(`<a href="https://wa.me/${cp(b.phone)}?text=${encodeURIComponent('Hello '+b.fn+'! Your booking #'+b.id+' is ready. See you soon! — '+BIZ.name+' 🌊')}" target="_blank" class="btn btn-sm btn-wa" style="text-decoration:none">📲 WA</a>`);
    return`<div class="bk-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-weight:700;color:var(--navy);font-size:14.5px">${esc(b.eName)} x ${b.qty}</div><div style="font-size:12px;color:var(--mut);margin-top:2px">#${b.id} · ${esc(b.fn)} ${esc(b.ln)} · ${b.st}–${b.et}</div><div style="font-size:13px;font-weight:600;color:var(--td);margin-top:2px">${fmt(b.total)} · ${esc(b.phone||'')}</div></div>${statusBadge(b.status)}</div>
    <div style="font-size:11px;display:flex;gap:12px;margin-bottom:10px"><span style="color:${b.w?'var(--green)':'var(--coral)'}">${b.w?'✓ Waiver':'⚠ No waiver'}</span><span style="color:${b.idData?'var(--green)':'var(--mut)'}">${b.idData?'✓ ID on file':'No ID'}</span></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap"><button class="btn btn-sm btn-secondary" onclick="showDetail('${b.id}')">👁 View</button>${acts.join('')}</div></div>`;
  }).join('');
}
function doCI(id){ST.bookings=ST.bookings.map(b=>b.id===id?{...b,status:'checked-in',cin:nowTime()}:b);persist();toast('Checked in ✅');setTab('checkin');}
function doReturn(id){const b=ST.bookings.find(x=>x.id===id);ST.bookings=ST.bookings.map(bk=>bk.id===id?{...bk,status:'returned',ret:nowTime()}:bk);if(b)ST.equip=ST.equip.map(e=>e.id===b.eid?{...e,booked:Math.max(0,(e.booked||0)-b.qty)}:e);persist();toast('Returned ✅');setTab('checkin');}
function doCancel(id){const b=ST.bookings.find(x=>x.id===id);ST.bookings=ST.bookings.map(bk=>bk.id===id?{...bk,status:'cancelled'}:bk);if(b)ST.equip=ST.equip.map(e=>e.id===b.eid?{...e,booked:Math.max(0,(e.booked||0)-b.qty)}:e);persist();toast('Cancelled','warn');setTab('checkin');}
function showDetail(id){
  const b=ST.bookings.find(x=>x.id===id);if(!b)return;
  const rows=[['Name',b.fn+' '+b.ln],['Phone',b.phone],b.email&&['Email',b.email],['Equipment',b.eName+' x '+b.qty],['Date',fmtDate(b.date)],['Time',b.st+'→'+b.et],['Duration',b.dur+' hr'],['Payment',b.pl||b.pay],['Total',fmt(b.total)],['Status',b.status],['Waiver',b.w?'✅ Signed':'❌ Not signed'],['ID Photo',b.idName||'Not uploaded'],b.by&&['Booked by',b.by],b.notes&&['Notes',b.notes]].filter(Boolean);
  openModal('Booking #'+b.id,`${b.idData?`<img src="${b.idData}" style="max-width:100%;max-height:180px;border-radius:10px;border:2px solid var(--teal);margin-bottom:16px"/>`:''}<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:16px;font-size:13px">${rows.map(([k,v])=>`<div><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mut)">${esc(k)}</div><div style="color:var(--txt);margin-top:2px">${esc(v)}</div></div>`).join('')}</div>${b.phone?`<a href="https://wa.me/${cp(b.phone)}?text=${buildWA(b)}" target="_blank" class="btn btn-wa btn-full" style="text-decoration:none;display:flex">📲 Send via WhatsApp</a>`:''}`,true);
}
/* EQUIPMENT */
function renderEquip(){
  const isBoss=ST.user.role==='boss';
  return`<div><h2 class="page-title">Fleet Inventory</h2><div style="display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(240px,1fr))">${ST.equip.map(e=>{const av=e.total-(e.booked||0);const pct=e.total>0?av/e.total:0;return`<div class="equip-card" style="border-color:${av===0?'var(--coral)':av<=2?'var(--gold)':'var(--brd)'}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div><div style="font-size:10px;font-weight:600;color:var(--mut)">[${esc(e.code)}]</div><div style="font-weight:700;color:var(--navy);font-size:14px">${esc(e.name)}</div><div style="font-size:12px;color:var(--mut)">${e.rate===0?'FREE':'$'+e.rate+'/hr'} · ${esc(e.cat)}</div></div>${isBoss?`<button class="btn btn-secondary btn-sm" onclick="editEq(${e.id})">Edit</button>`:''}</div><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>Available: <strong>${av}</strong> / ${e.total}</span><span style="font-weight:700;color:${av===0?'var(--coral)':av<=2?'var(--gold)':'var(--green)'}">${av===0?'FULL':av<=2?'LOW':'OK'}</span></div><div class="equip-bar-wrap"><div class="equip-bar" style="width:${pct*100}%;background:${av===0?'var(--coral)':av<=2?'var(--gold)':'var(--teal)'}"></div></div>${e.condition?`<div style="font-size:11px;color:var(--mut);margin-top:6px">${esc(e.condition)}</div>`:''}</div>`;}).join('')}</div></div>`;
}
function editEq(id){
  const e=ST.equip.find(x=>x.id===id);if(!e)return;
  openModal('Edit ['+e.code+'] '+e.name,`<div style="margin-bottom:12px"><label class="lbl">Name</label><input class="inp" id="eq-n" value="${esc(e.name)}"/></div><div style="margin-bottom:12px"><label class="lbl">Total Units</label><input class="inp" type="number" min="0" id="eq-t" value="${e.total}"/></div><div style="margin-bottom:12px"><label class="lbl">Rate per Hour (0=FREE)</label><input class="inp" type="number" min="0" id="eq-r" value="${e.rate}"/></div><div style="margin-bottom:20px"><label class="lbl">Condition Notes</label><input class="inp" id="eq-c" value="${esc(e.condition||'')}"/></div><div style="display:flex;gap:10px"><button class="btn btn-primary" onclick="saveEq(${id})">Save</button><button class="btn btn-secondary" onclick="closeModal()">Cancel</button></div>`);
}
function saveEq(id){
  const n=document.getElementById('eq-n').value.trim();if(!n){toast('Name required','error');return;}
  ST.equip=ST.equip.map(e=>e.id===id?{...e,name:n,total:parseInt(document.getElementById('eq-t').value)||0,rate:parseFloat(document.getElementById('eq-r').value)||0,condition:document.getElementById('eq-c').value.trim()}:e);
  persist();closeModal();toast('Updated ✅');setTab('equip');
}
/* REPORTS */
function renderReports(){
  return`<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"><h2 class="page-title" style="margin:0">Reports</h2><div style="display:flex;gap:8px"><select class="inp" style="width:auto;padding:8px 12px" id="rpt-range" onchange="updateReport()"><option value="today">Today</option><option value="week">Last 7 days</option><option value="month">This month</option><option value="all">All time</option></select><button class="btn btn-secondary btn-sm" onclick="exportCSV()">📥 CSV</button></div></div><div id="rpt-body"></div></div>`;
}
function updateReport(){
  const range=document.getElementById('rpt-range')?.value||'today';
  const now=new Date();
  const f=ST.bookings.filter(b=>{const d=new Date(b.date+'T12:00');if(range==='today')return b.date===today();if(range==='week')return(now-d)<=7*864e5;if(range==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();return true;});
  const ac=f.filter(b=>b.status!=='cancelled');
  const rev=ac.reduce((s,b)=>s+b.total,0);
  const be={};ac.forEach(b=>{if(!be[b.eName])be[b.eName]={n:0,r:0};be[b.eName].n+=b.qty;be[b.eName].r+=b.total;});
  const el=document.getElementById('rpt-body');if(!el)return;
  el.innerHTML=`<div class="g3" style="margin-bottom:20px">${[['Revenue',fmt(rev),'var(--teal)'],['Bookings',f.length,'var(--navy)'],['Active',f.filter(b=>b.status==='checked-in').length,'var(--gold)'],['Returned',f.filter(b=>b.status==='returned').length,'var(--green)'],['Cancelled',f.filter(b=>b.status==='cancelled').length,'var(--coral)']].map(([l,v,c])=>`<div class="stat-card" style="border-left-color:${c}"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}</div><div class="card"><div style="font-weight:700;color:var(--navy);margin-bottom:12px;font-size:14px">Revenue by Equipment</div>${Object.keys(be).length===0?'<div style="color:var(--mut)">No data.</div>':Object.entries(be).sort((a,b)=>b[1].r-a[1].r).map(([n,d])=>`<div style="display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--brd);font-size:13px"><span>${esc(n)} (${d.n} rented)</span><span style="font-weight:600;color:var(--td)">${fmt(d.r)}</span></div>`).join('')}</div>`;
}
function exportCSV(){
  const rows=[['ID','Name','Phone','Equipment','Qty','Date','Start','End','Hrs','Total','Payment','Status','Waiver','ID','By'],...ST.bookings.map(b=>[b.id,b.fn+' '+b.ln,b.phone,b.eName,b.qty,b.date,b.st,b.et,b.dur,b.total,b.pay,b.status,b.w?'Yes':'No',b.idName?'Yes':'No',b.by||''])];
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(rows.map(r=>r.join(',')).join('\n'));a.download='APR_'+today()+'.csv';a.click();toast('CSV downloaded ✅');
}
/* RENTALS */
function renderRentals(){
  return`<div><h2 class="page-title">All Rentals</h2><div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"><input class="inp" placeholder="Search..." style="flex:1;min-width:130px" oninput="filterR(this.value,document.getElementById('rl-f').value)" id="rl-q"/><select class="inp" style="width:auto" id="rl-f" onchange="filterR(document.getElementById('rl-q').value,this.value)"><option value="all">All</option><option value="confirmed">Confirmed</option><option value="checked-in">Active</option><option value="returned">Returned</option><option value="cancelled">Cancelled</option></select></div><div id="rl-list">${renderRL(ST.bookings,'','all')}</div></div>`;
}
function renderRL(bks,q,f){
  const l=bks.filter(b=>(b.fn+b.ln+b.id+b.eName).toLowerCase().includes(q.toLowerCase())&&(f==='all'||b.status===f));
  if(!l.length)return`<div style="text-align:center;padding:48px;color:var(--mut)">No rentals found.</div>`;
  const m={confirmed:'bg-gold',['checked-in']:'bg-blue',returned:'bg-green',cancelled:'bg-red'};
  return l.map(b=>`<div onclick="showDetail('${b.id}')" style="background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:10px;cursor:pointer;border:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;transition:box-shadow .15s" onmouseenter="this.style.boxShadow='0 4px 16px rgba(11,30,45,.1)'" onmouseleave="this.style.boxShadow='none'"><div><div style="font-weight:600;color:var(--navy);font-size:14px">${esc(b.eName)} x ${b.qty} — ${esc(b.fn)} ${esc(b.ln)}</div><div style="font-size:12px;color:var(--mut);margin-top:3px">#${b.id} · ${fmtDate(b.date)} · ${b.st}–${b.et} · ${fmt(b.total)}</div></div><div style="display:flex;gap:8px;align-items:center">${b.w?'<span style="color:var(--green);font-size:12px;font-weight:600">✓W</span>':''}${b.idData?'<span style="font-size:14px">🪪</span>':''}<span class="badge ${m[b.status]||'bg-teal'}">${b.status}</span></div></div>`).join('');
}
function filterR(q,f){document.getElementById('rl-list').innerHTML=renderRL(ST.bookings,q,f);}
/* STAFF */
function renderStaff(){
  return`<div><h2 class="page-title">Staff Management</h2>${ST.users.map(u=>`<div class="staff-card"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px"><div><span style="font-weight:700;color:var(--navy);font-size:14px">${esc(u.name)}</span><span class="badge ${u.role==='boss'?'bg-navy':'bg-teal'}" style="margin-left:8px">${u.role}</span>${u.whatsapp?`<div style="font-size:11px;color:var(--mut);margin-top:3px">📱 ${esc(u.whatsapp)}</div>`:''}</div><div style="display:flex;gap:8px;align-items:center"><span style="font-size:12px;font-weight:600;color:${u.active?'var(--green)':'var(--mut)'}">${u.active?'● Active':'○ Inactive'}</span><button class="btn btn-secondary btn-sm" onclick="toggleU('${u.id}')">${u.active?'Deactivate':'Activate'}</button>${u.id!=='boss'?`<button class="btn btn-danger btn-sm" onclick="removeU('${u.id}')">Remove</button>`:''}</div></div><div style="display:flex;gap:8px"><input class="inp" type="password" placeholder="New PIN (4-6 digits)" maxlength="6" id="pin-${u.id}" style="flex:1" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/><button class="btn btn-primary btn-sm" onclick="chPin('${u.id}')">Update PIN</button></div></div>`).join('')}
  <div class="card" style="background:var(--tl)"><div style="font-weight:700;color:var(--navy);margin-bottom:14px;font-size:14px">➕ Add Staff Member</div>
  <div class="g2"><div><label class="lbl">Full Name *</label><input class="inp" id="ns-n" placeholder="Full name"/></div><div><label class="lbl">Role</label><select class="inp" id="ns-r"><option value="staff">Staff (Booking + Check-in)</option><option value="boss">Boss (Full Access)</option></select></div><div><label class="lbl">PIN (4-6 digits) *</label><input class="inp" type="password" id="ns-p" maxlength="6" placeholder="e.g. 1234" oninput="this.value=this.value.replace(/[^0-9]/g,'')"/></div><div><label class="lbl">WhatsApp</label><input class="inp" id="ns-w" placeholder="17844961234"/></div></div>
  <button class="btn btn-primary" style="margin-top:14px" onclick="addU()">Add Staff Member</button></div></div>`;
}
function toggleU(id){ST.users=ST.users.map(u=>u.id===id?{...u,active:!u.active}:u);persist();setTab('staff');}
function removeU(id){if(!confirm('Remove this staff member?'))return;ST.users=ST.users.filter(u=>u.id!==id);persist();toast('Removed','warn');setTab('staff');}
function chPin(id){const inp=document.getElementById('pin-'+id);const p=inp?.value||'';if(p.length<4||!/^\d+$/.test(p)){toast('PIN must be 4-6 digits','error');return;}ST.users=ST.users.map(u=>u.id===id?{...u,pin:p}:u);persist();inp.value='';toast('PIN updated ✅');}
function addU(){const n=document.getElementById('ns-n').value.trim();const r=document.getElementById('ns-r').value;const p=document.getElementById('ns-p').value;const w=document.getElementById('ns-w').value.trim();if(!n){toast('Name required','error');return;}if(p.length<4||!/^\d+$/.test(p)){toast('PIN: 4-6 digits','error');return;}ST.users.push({id:'u_'+Date.now(),name:n,role:r,pin:p,whatsapp:w,active:true});persist();toast('Added ✅');setTab('staff');}
/* SETTINGS */
function renderSettings(){
  return`<div><h2 class="page-title">Settings</h2><div class="card"><div style="font-weight:700;color:var(--navy);margin-bottom:6px;font-size:15px">💳 Payment Methods</div><div style="font-size:12px;color:var(--mut);margin-bottom:16px">Toggle on/off. Only active methods appear in booking form.</div><div id="pay-list">${renderPay()}</div><div style="border-top:1px solid var(--brd);padding-top:16px;margin-top:8px"><div style="font-weight:600;color:var(--navy);font-size:13px;margin-bottom:10px">Add Custom Method</div><div style="display:flex;gap:10px;flex-wrap:wrap"><input class="inp" id="pm-icon" value="💰" maxlength="2" style="width:56px;text-align:center;font-size:20px"/><input class="inp" id="pm-label" placeholder="Method name..." style="flex:1;min-width:130px"/><button class="btn btn-primary" onclick="addPM()">Add</button></div></div></div></div>`;
}
function renderPay(){return ST.payments.map(pm=>`<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:12px;border:1.5px solid ${pm.active?'var(--teal)':'var(--brd)'};margin-bottom:10px;background:${pm.active?'var(--tl)':'#fdfdfb'};transition:all .2s"><span style="font-size:20px">${pm.icon}</span><span style="flex:1;font-weight:500">${esc(pm.label)}</span>${pm.custom?`<button style="background:none;border:none;color:var(--coral);font-size:17px;cursor:pointer" onclick="removePM('${pm.id}')">🗑️</button>`:''}<div class="toggle-wrap" style="background:${pm.active?'var(--teal)':'var(--brd)'}" onclick="togglePM('${pm.id}')"><div class="toggle-knob" style="left:${pm.active?22:3}px"></div></div></div>`).join('');}
function togglePM(id){ST.payments=ST.payments.map(p=>p.id===id?{...p,active:!p.active}:p);persist();document.getElementById('pay-list').innerHTML=renderPay();}
function removePM(id){ST.payments=ST.payments.filter(p=>p.id!==id);persist();document.getElementById('pay-list').innerHTML=renderPay();}
function addPM(){const icon=document.getElementById('pm-icon').value||'💰';const label=document.getElementById('pm-label').value.trim();if(!label){toast('Enter method name','error');return;}ST.payments.push({id:'pm_'+Date.now(),icon,label,active:true,custom:true});persist();document.getElementById('pay-list').innerHTML=renderPay();document.getElementById('pm-label').value='';toast('Added ✅');}
/* INIT */
renderLogin();

</script>
</body></html>
