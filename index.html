function Toasts({toasts,dismiss}){
  return(<div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,maxWidth:300}}>
    {toasts.map(t=>(
      <div key={t.id} onClick={()=>dismiss(t.id)} style={{
        background:t.type==="error"?"#E0351B":t.type==="warn"?"#FBC62C":"#1B8A4C",
        color:"#fff",padding:"12px 16px",borderRadius:12,cursor:"pointer",
        fontSize:13,fontFamily:"var(--sans)",fontWeight:500,
        boxShadow:"0 4px 20px rgba(0,0,0,.25)",animation:"slideIn .25s ease",
        display:"flex",gap:10,alignItems:"center",
      }}>
        <span>{t.type==="error"?"❌":t.type==="warn"?"⚠️":"✅"}</span>
        <span>{t.msg}</span>
      </div>
    ))}
  </div>);
}

function Modal({title,children,onClose,wide}){

        background:"#fff",borderRadius:20,padding:28,width:"100%",
        maxWidth:wide?820:520,maxHeight:"92vh",overflowY:"auto",
        boxShadow:"0 24px 60px rgba(0,0,0,.4)",fontFamily:"var(--sans)",

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h2 style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--navy)",fontWeight:600}}>{title}</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,
            color:"var(--muted)",lineHeight:1,padding:"0 4px"}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

const LST={display:"block",fontSize:10.5,fontWeight:600,textTransform:"uppercase",
  letterSpacing:".07em",color:"var(--muted)",marginBottom:6,marginTop:14};
const IST={width:"100%",padding:"11px 13px",border:"1.5px solid var(--border)",
  borderRadius:10,fontSize:15,color:"var(--text)",background:"#fdfdfb"};

function Field({label,value,onChange,type="text",placeholder,required}){
  return(<div>
    <label style={LST}>{label}{required&&<span style={{color:"var(--coral)"}}> *</span>}</label>
    <input type={type} value={value} placeholder={placeholder||""}
      onChange={e=>onChange(e.target.value)}
      style={IST} onFocus={e=>e.target.style.borderColor="var(--teal)"}
      onBlur={e=>e.target.style.borderColor="var(--border)"}/>
  </div>);
}
function Btn({children,onClick,secondary,danger,small,disabled,full}){
  const bg=danger?"var(--coral)":secondary?"#fff":"var(--teal)";
  const col=secondary?"var(--teal-d)":"#fff";
  const bdr=secondary?"1.5px solid var(--teal)":"none";
  return(<button onClick={onClick} disabled={disabled} style={{
    padding:small?"9px 16px":"13px 22px",border:bdr,borderRadius:11,
    background:disabled?"#ccc":bg,color:disabled?"#888":col,
    fontWeight:600,fontSize:small?13:14.5,width:full?"100%":undefined,
    opacity:disabled?.6:1,transition:"all .15s",
  }}>{children}</button>);
}

/* ═══════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════ */
function LoginScreen({users,onLogin}){
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[sel,setSel]=useState(users.filter(u=>u.active)[0]?.id||"");

  function attempt(){
    const user=users.find(u=>u.id===sel&&u.active);
    if(!user){setErr("User not found.");return;}
    if(user.pin===pin){onLogin(user);setPin("");}
    else{setErr("Wrong PIN. Try again.");setPin("");}
  }
  function press(d){
    if(d==="del")setPin(p=>p.slice(0,-1));
    else if(pin.length<6)setPin(p=>p+d);
    setErr("");
  }

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,var(--navy2),var(--navy) 60%,var(--teal-d))`,
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>
      <img src={LOGO_SRC} alt="APR Logo" style={{width:110,height:110,borderRadius:"50%",
        border:"3px solid var(--gold)",marginBottom:20,objectFit:"cover",
        boxShadow:"0 0 0 6px rgba(251,198,44,.2)"}}/>
      <div style={{fontFamily:"var(--serif)",fontSize:26,fontWeight:600,color:"#fff",marginBottom:4}}>
        Aquatic Paradise Rentals
      </div>
      <div style={{fontSize:12,color:"var(--gold)",textTransform:"uppercase",
        letterSpacing:".14em",marginBottom:36}}>Staff Login</div>

      <div style={{background:"rgba(255,255,255,.06)",backdropFilter:"blur(10px)",
        borderRadius:20,padding:28,width:"100%",maxWidth:320,
        border:"1px solid rgba(255,255,255,.1)"}}>

        <label style={{...LST,color:"#B9CDD2"}}>Select Account</label>
        <select value={sel} onChange={e=>{setSel(e.target.value);setPin("");setErr("");}}
          style={{...IST,background:"rgba(255,255,255,.08)",color:"#fff",
            borderColor:"rgba(255,255,255,.15)",marginBottom:20}}>
          {users.filter(u=>u.active).map(u=>(
            <option key={u.id} value={u.id} style={{background:"#0B1E2D"}}>{u.name}</option>
          ))}
        </select>

        {/* PIN dots */}
        <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:20}}>
          {Array.from({length:6}).map((_,i)=>(
            <div key={i} style={{width:14,height:14,borderRadius:"50%",
              background:i<pin.length?"var(--gold)":"rgba(255,255,255,.2)",
              transition:"background .15s"}}/>
          ))}
        </div>

        {/* Numpad */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
          {["1","2","3","4","5","6","7","8","9","","0","del"].map((d,i)=>(
            <button key={i} onClick={()=>d&&press(d)} style={{
              padding:14,borderRadius:12,border:"1px solid rgba(255,255,255,.1)",
              background:d==="del"?"rgba(224,53,27,.3)":d?"rgba(255,255,255,.08)":"transparent",
              color:d?"#fff":"transparent",fontSize:d==="del"?18:18,fontWeight:600,
              cursor:d?"pointer":"default",fontFamily:"var(--sans)",
            }}>{d==="del"?"⌫":d}</button>
          ))}
        </div>

        {err&&<div style={{color:"#ffb3a7",fontSize:12,textAlign:"center",marginBottom:12}}>{err}</div>}

        <button onClick={attempt} disabled={pin.length<4} style={{
          width:"100%",padding:14,borderRadius:12,border:"none",
          background:pin.length>=4?"var(--gold)":"rgba(255,255,255,.1)",
          color:pin.length>=4?"var(--navy)":"rgba(255,255,255,.3)",
          fontWeight:700,fontSize:15,fontFamily:"var(--sans)",transition:"all .2s",
        }}>Enter</button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   NOTIFICATION SYSTEM
   Sends WhatsApp via wa.me link — opens in
   browser/app. No API key needed.
═══════════════════════════════════════════ */
function buildBookingMsg(b,payments){
  const pay=payments.find(p=>p.id===b.payment)?.label||b.payment;
  return encodeURIComponent(
`🌊 *${BIZ.name}*
━━━━━━━━━━━━━━━━━━━
*NEW BOOKING CONFIRMED*
📋 ID: *${b.id}*
👤 ${b.firstName} ${b.lastName}
📱 ${b.phone}${b.email?"
📧 "+b.email:""}
🏄 ${b.equipName} × ${b.qty}
📅 ${fmtDate(b.date)}
🕐 ${b.startTime} → ${b.endTime}
💰 ${fmt(b.total)} · ${pay}
✅ Waiver signed ✅ Contract accepted
${b.idPhotoName?"🪪 ID on file":""}
━━━━━━━━━━━━━━━━━━━
Thank you for choosing ${BIZ.name}! 🏝️`
  );
}

function notifyBoss(b,bossWhatsapp,payments){
  const msg=buildBookingMsg(b,payments);
  window.open(`https://wa.me/${cleanPhone(bossWhatsapp)}?text=${msg}`,"_blank");
}
function notifyCustomer(b,payments){
  if(!b.phone)return;
  const msg=buildBookingMsg(b,payments);
  window.open(`https://wa.me/${cleanPhone(b.phone)}?text=${msg}`,"_blank");
}

/* ═══════════════════════════════════════════
   BOOKING TAB
═══════════════════════════════════════════ */
function BookingTab({equipment,onBook,toast,payments,currentUser,bossWhatsapp}){
  const blank={firstName:"",lastName:"",email:"",phone:"",
    equipId:"",qty:1,date:todayStr(),startTime:"08:00",duration:1,
    payment:payments[0]?.id||"cash",notes:"",
    idPhotoName:"",idPhotoData:"",waiverSigned:false,contractSigned:false};
  const[f,setF]=useState(blank);
  const[step,setStep]=useState(1);
  const fileRef=useRef();
  const sel=equipment.find(e=>e.id===Number(f.equipId));
  const avail=sel?sel.total-(sel.booked||0):0;
  const total=sel?sel.rate*f.duration*f.qty:0;

  function set(k,v){setF(p=>({...p,[k]:v}));}
  function handlePhoto(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>set("idPhotoData",ev.target.result);
    r.readAsDataURL(file);
    set("idPhotoName",file.name);
  }
  function submit(){
    if(!f.firstName||!f.lastName)return toast("Enter customer name","error");
    if(!f.phone)return toast("Phone number required","error");
    if(!f.equipId)return toast("Select equipment","error");
    if(f.qty>avail||f.qty<1)return toast(`Only ${avail} units available`,"error");
    if(!f.idPhotoData)return toast("Photo ID required","error");
    if(!f.waiverSigned)return toast("Customer must sign the waiver","error");
    if(!f.contractSigned)return toast("Customer must accept the contract","error");
    const endTime=addHours(f.startTime,f.duration);
    const booking={id:uid(),...f,
      equipId:Number(f.equipId),equipName:sel.name,
      rate:sel.rate,total,endTime,
      status:"confirmed",bookedBy:currentUser.name,
      createdAt:new Date().toISOString()};
    onBook(booking);
    // Auto-notify boss + customer
    const bossNum=bossWhatsapp||BIZ.whatsapp;
    if(currentUser.role!=="boss"){
      setTimeout(()=>notifyBoss(booking,bossNum,payments),300);
    }
    setTimeout(()=>notifyCustomer(booking,payments),1000);
    setF(blank);setStep(1);
    toast("Booking confirmed! WhatsApp opening... 📲");
  }

  const STEPS=["Customer","Equipment","Payment","Sign & Confirm"];
  const stepIcons=["👤","🏄","💳","✍️"];

  return(
    <div className="anim">
      {/* Step bar */}
      <div style={{display:"flex",gap:2,marginBottom:20,borderRadius:12,overflow:"hidden",
        border:"1px solid var(--border)"}}>
        {STEPS.map((s,i)=>(
          <div key={i} onClick={()=>i+1<step&&setStep(i+1)} style={{
            flex:1,padding:"11px 6px",textAlign:"center",
            background:step===i+1?"var(--teal)":step>i+1?"var(--teal-d)":"#fff",
            color:step>=i+1?"#fff":"var(--muted)",
            fontSize:11,fontWeight:600,cursor:i+1<step?"pointer":"default",
            borderRight:"1px solid var(--border)",transition:"all .2s"}}>
            <div style={{fontSize:15}}>{step>i+1?"✓":stepIcons[i]}</div>
            {s}
          </div>
        ))}
      </div>

      <div style={{background:"#fff",borderRadius:16,padding:24,
        boxShadow:"0 2px 16px rgba(11,30,45,.06)"}}>

        {step===1&&(
          <div>
            <h3 style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--navy)",marginBottom:16}}>
              👤 Customer Details
            </h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <Field label="First Name" value={f.firstName} onChange={v=>set("firstName",v)} required/>
              <Field label="Last Name" value={f.lastName} onChange={v=>set("lastName",v)} required/>
              <Field label="WhatsApp / Phone" value={f.phone} onChange={v=>set("phone",v)} required placeholder="17844961234"/>
              <Field label="Email" value={f.email} onChange={v=>set("email",v)} type="email"/>
            </div>
            {/* ID Photo */}
            <label style={{...LST,marginTop:20}}>Photo ID <span style={{color:"var(--coral)"}}>*</span></label>
            <div style={{border:"2px dashed var(--border)",borderRadius:12,padding:20,
              textAlign:"center",cursor:"pointer",background:"#fdfdfb",transition:"border-color .2s"}}
              onClick={()=>fileRef.current.click()}
              onMouseEnter={e=>e.currentTarget.style.borderColor="var(--teal)"}
              onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              {f.idPhotoData
                ?<img src={f.idPhotoData} alt="ID" style={{maxHeight:130,borderRadius:9,border:"2px solid var(--teal)"}}/>
                :<div style={{color:"var(--muted)",fontSize:13}}>
                  📷 Tap to capture / upload ID photo<br/>
                  <span style={{fontSize:11}}>Passport · Driver's Licence · National ID</span>
                </div>}
            </div>
            <input ref={fileRef} type="file" accept="image/*" capture="environment"
              style={{display:"none"}} onChange={handlePhoto}/>
            {f.idPhotoName&&<div style={{fontSize:11,color:"var(--green)",marginTop:6}}>✓ {f.idPhotoName}</div>}
            <div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}>
              <Btn onClick={()=>{if(!f.firstName||!f.lastName||!f.phone)return toast("Fill required fields","error");setStep(2);}}>Next →</Btn>
            </div>
          </div>
        )}

        {step===2&&(
          <div>
            <h3 style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--navy)",marginBottom:16}}>
              🏄 Equipment & Schedule
            </h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{gridColumn:"span 2"}}>
                <label style={LST}>Equipment <span style={{color:"var(--coral)"}}>*</span></label>
                <select value={f.equipId} onChange={e=>set("equipId",e.target.value)}
                  style={{...IST}} onFocus={e=>e.target.style.borderColor="var(--teal)"}
                  onBlur={e=>e.target.style.borderColor="var(--border)"}>
                  <option value="">— Select equipment —</option>
                  {equipment.map(e=>{
                    const av=e.total-(e.booked||0);
                    return(<option key={e.id} value={e.id} disabled={av===0}>
                      [{e.code}] {e.name} — {e.rate===0?"FREE":`$${e.rate}/hr`} ({av} avail{av===0?" — FULL":""})
                    </option>);
                  })}
                </select>
                {sel&&avail<=2&&avail>0&&<div style={{fontSize:11,color:"var(--coral)",marginTop:4}}>⚠️ Only {avail} left</div>}
                {sel&&avail===0&&<div style={{fontSize:11,color:"var(--coral)",marginTop:4}}>❌ Fully booked</div>}
              </div>
              <div>
                <label style={LST}>Quantity <span style={{color:"var(--coral)"}}>*</span></label>
                <input type="number" min={1} max={avail||1} value={f.qty}
                  onChange={e=>set("qty",Math.min(avail,Math.max(1,Number(e.target.value))))}
                  style={IST}/>
              </div>
              <div>
                <label style={LST}>Duration (hours) <span style={{color:"var(--coral)"}}>*</span></label>
                <input type="number" min={1} max={12} value={f.duration}
                  onChange={e=>set("duration",Math.max(1,Number(e.target.value)))}
                  style={IST}/>
              </div>
              <div>
                <label style={LST}>Date <span style={{color:"var(--coral)"}}>*</span></label>
                <input type="date" value={f.date} min={todayStr()}
                  onChange={e=>set("date",e.target.value)} style={IST}/>
              </div>
              <div>
                <label style={LST}>Start Time</label>
                <select value={f.startTime} onChange={e=>set("startTime",e.target.value)} style={IST}>
                  {SLOTS.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            {sel&&(
              <div style={{background:"linear-gradient(135deg,var(--navy2),var(--navy))",
                color:"#fff",borderRadius:14,padding:16,marginTop:16}}>
                <div style={{fontSize:11,color:"var(--gold)",textTransform:"uppercase",
                  letterSpacing:".07em",marginBottom:4}}>Cost Summary</div>
                <div style={{fontSize:13,opacity:.85,lineHeight:1.8}}>
                  {sel.name} × {f.qty} × {f.duration} hr{f.duration>1?"s":""}
                  {sel.rate>0?` @ $${sel.rate}/hr`:" — FREE"}
                </div>
                <div style={{fontFamily:"var(--serif)",fontSize:24,fontWeight:600,marginTop:4}}>
                  {fmt(total)}
                </div>
              </div>
            )}
            <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}>
              <Btn secondary onClick={()=>setStep(1)}>← Back</Btn>
              <Btn onClick={()=>{if(!f.equipId)return toast("Select equipment","error");if(f.qty>avail)return toast("Not enough stock","error");setStep(3);}}>Next →</Btn>
            </div>
          </div>
        )}

        {step===3&&(
          <div>
            <h3 style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--navy)",marginBottom:16}}>
              💳 Payment Method
            </h3>
            {payments.filter(p=>p.active).map(p=>(
              <label key={p.id} style={{display:"flex",alignItems:"center",gap:12,
                padding:"14px 16px",border:`2px solid ${f.payment===p.id?"var(--teal)":"var(--border)"}`,
                borderRadius:12,cursor:"pointer",marginBottom:10,
                background:f.payment===p.id?"var(--teal-l)":"#fdfdfb",transition:"all .15s"}}>
                <input type="radio" name="pay" value={p.id}
                  checked={f.payment===p.id} onChange={()=>set("payment",p.id)}
                  style={{accentColor:"var(--teal)"}}/>
                <span style={{fontSize:20}}>{p.icon}</span>
                <span style={{fontWeight:500}}>{p.label}</span>
              </label>
            ))}
            <Field label="Notes (optional)" value={f.notes} onChange={v=>set("notes",v)}/>
            <div style={{marginTop:20,display:"flex",justifyContent:"space-between"}}>
              <Btn secondary onClick={()=>setStep(2)}>← Back</Btn>
              <Btn onClick={()=>setStep(4)}>Next →</Btn>
            </div>
          </div>
        )}

        {step===4&&(
          <div>
            <h3 style={{fontFamily:"var(--serif)",fontSize:20,color:"var(--navy)",marginBottom:16}}>
              ✍️ Waiver & Confirmation
            </h3>
            {/* Waiver */}
            <div style={{border:"1px solid var(--border)",borderRadius:12,marginBottom:14,overflow:"hidden"}}>
              <div style={{background:"var(--navy)",color:"#fff",padding:"10px 16px",
                fontSize:13,fontWeight:600}}>⚠️ Liability Waiver</div>
              <pre style={{padding:14,fontSize:11,lineHeight:1.75,maxHeight:160,
                overflowY:"auto",whiteSpace:"pre-wrap",margin:0,
                color:"var(--text)",background:"#fdfdfb"}}>{WAIVER}</pre>
              <label style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
                background:"#fff",cursor:"pointer",borderTop:"1px solid var(--border)"}}>
                <input type="checkbox" checked={f.waiverSigned}
                  onChange={e=>set("waiverSigned",e.target.checked)}
                  style={{accentColor:"var(--teal)",width:16,height:16}}/>
                <span style={{fontSize:13}}>I, <strong>{f.firstName} {f.lastName}</strong>, agree to this waiver</span>
              </label>
            </div>
            {/* Contract checkbox */}
            <label style={{display:"flex",alignItems:"flex-start",gap:10,
              padding:14,border:"1px solid var(--border)",borderRadius:12,
              cursor:"pointer",marginBottom:16,background:"#fdfdfb"}}>
              <input type="checkbox" checked={f.contractSigned}
                onChange={e=>set("contractSigned",e.target.checked)}
                style={{accentColor:"var(--teal)",width:16,height:16,marginTop:2}}/>
              <span style={{fontSize:13,lineHeight:1.6}}>
                I accept the rental contract terms — equipment returned on time and in good condition.
                I accept full liability for damage or loss.
              </span>
            </label>
            {/* Summary */}
            {sel&&(
              <div style={{background:"linear-gradient(135deg,var(--navy2),var(--navy))",
                color:"#fff",borderRadius:14,padding:18,marginBottom:16,fontSize:13,lineHeight:2}}>
                <div style={{fontFamily:"var(--serif)",fontSize:18,marginBottom:6}}>Booking Summary</div>
                👤 {f.firstName} {f.lastName} · {f.phone}<br/>
                🏄 {sel.name} × {f.qty}<br/>
                📅 {fmtDate(f.date)} · {f.startTime} → {addHours(f.startTime,f.duration)}<br/>
                💳 {payments.find(p=>p.id===f.payment)?.label||f.payment}<br/>
                <span style={{fontFamily:"var(--serif)",fontSize:20,fontWeight:600}}>{fmt(total)}</span>
              </div>
            )}
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <Btn secondary onClick={()=>setStep(3)}>← Back</Btn>
              <Btn onClick={submit}>✅ Confirm Booking</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   CHECK-IN TAB
═══════════════════════════════════════════ */
function CheckInTab({bookings,onCheckIn,onCheckOut,onCancel,setModal,payments}){
  const[q,setQ]=useState("");
  const today=bookings.filter(b=>b.date===todayStr());
  const list=today.filter(b=>{
    const s=(b.firstName+b.lastName+b.id+b.equipName).toLowerCase();
    return s.includes(q.toLowerCase());
  });
  const statusStyle=(s)=>{
    const map={confirmed:{bg:"#FFF3D6",col:"#92670A"},
      "checked-in":{bg:"#DCEEFF",col:"#0A5FA8"},
      returned:{bg:"#E3F5EC",col:"#0A6A3A"},
      cancelled:{bg:"#FBE0E0",col:"#A8200A"}};
    return map[s]||{bg:"#eee",col:"#666"};
  };
  return(
    <div className="anim">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h2 style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--navy)"}}>
          Today's Rentals
        </h2>
        <span style={{fontSize:12,color:"var(--muted)"}}>
          {new Date().toLocaleDateString("en-VC",{weekday:"long",day:"numeric",month:"short"})}
        </span>
      </div>
      <input placeholder="Search name, ID, equipment…" value={q}
        onChange={e=>setQ(e.target.value)}
        style={{...IST,marginBottom:16}}/>
      {list.length===0&&(
        <div style={{textAlign:"center",padding:48,color:"var(--muted)",fontSize:14}}>
          No bookings for today yet.
        </div>
      )}
      {list.map(b=>{
        const st=statusStyle(b.status);
        return(
          <div key={b.id} style={{background:"#fff",borderRadius:14,padding:18,
            marginBottom:12,boxShadow:"0 2px 12px rgba(11,30,45,.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",
              alignItems:"flex-start",flexWrap:"wrap",gap:8,marginBottom:10}}>
              <div>
                <div style={{fontWeight:700,color:"var(--navy)",fontSize:15}}>
                  {b.equipName} × {b.qty}
                </div>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>
                  #{b.id} · {b.firstName} {b.lastName} · {b.startTime}–{b.endTime}
                </div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--teal-d)",marginTop:2}}>
                  {fmt(b.total)} · {b.phone}
                </div>
              </div>
              <span style={{padding:"5px 12px",borderRadius:20,fontSize:11,
                fontWeight:700,background:st.bg,color:st.col,textTransform:"capitalize"}}>
                {b.status}
              </span>
            </div>
            {/* Waiver/ID status */}
            <div style={{fontSize:11,display:"flex",gap:12,marginBottom:10}}>
              <span style={{color:b.waiverSigned?"var(--green)":"var(--coral)"}}>
                {b.waiverSigned?"✓ Waiver":"⚠ No waiver"}
              </span>
              <span style={{color:b.idPhotoData?"var(--green)":"var(--muted)"}}>
                {b.idPhotoData?"✓ ID on file":"No ID"}
              </span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setModal({type:"detail",data:b})} style={{
                padding:"7px 14px",borderRadius:9,border:"1px solid var(--border)",
                background:"#fff",fontSize:12,fontWeight:600,color:"var(--teal-d)"}}>
                👁 View
              </button>
              {b.status==="confirmed"&&<>
                <button onClick={()=>onCheckIn(b.id)} style={{padding:"7px 14px",
                  borderRadius:9,border:"none",background:"var(--teal)",
                  color:"#fff",fontSize:12,fontWeight:600}}>✅ Check In</button>
                <button onClick={()=>onCancel(b.id)} style={{padding:"7px 14px",
                  borderRadius:9,border:"none",background:"var(--coral)",
                  color:"#fff",fontSize:12,fontWeight:600}}>✕ Cancel</button>
              </>}
              {b.status==="checked-in"&&(
                <button onClick={()=>onCheckOut(b.id)} style={{padding:"7px 14px",
                  borderRadius:9,border:"none",background:"var(--green)",
                  color:"#fff",fontSize:12,fontWeight:600}}>📦 Return</button>
              )}
              {b.phone&&(
                <a href={`https://wa.me/${cleanPhone(b.phone)}?text=${encodeURIComponent(
                  "Hello "+b.firstName+"! Your booking #"+b.id+" for "+b.equipName+
                  " at "+b.startTime+" is confirmed. See you soon! — "+BIZ.name+" 🌊")}`}
                  target="_blank" rel="noreferrer"
                  style={{padding:"7px 14px",borderRadius:9,border:"none",
                    background:"#25D366",color:"#fff",fontSize:12,fontWeight:600,
                    textDecoration:"none",display:"inline-block"}}>
                  📲 WhatsApp
                </a>
              )}
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ═══════════════════════════════════════════
   EQUIPMENT TAB
═══════════════════════════════════════════ */
function EquipTab({equipment,setEquipment,toast,currentUser}){
  const[editing,setEditing]=useState(null);
  function save(e){
    setEquipment(p=>p.map(x=>x.id===e.id?e:x));
    setEditing(null);toast("Updated ✅");
  }
  return(
    <div className="anim">
      <h2 style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--navy)",marginBottom:16}}>
        Fleet Inventory
      </h2>
      <div style={{display:"grid",gap:12,gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))"}}>
        {equipment.map(e=>{
          const avail=e.total-(e.booked||0);
          const pct=e.total>0?avail/e.total:0;
          const border=avail===0?"var(--coral)":avail<=2?"var(--gold)":"var(--border)";
          return(
            <div key={e.id} style={{background:"#fff",borderRadius:14,padding:18,
              border:`1.5px solid ${border}`,boxShadow:"0 1px 8px rgba(11,30,45,.05)"}}>
              {editing?.id===e.id?(
                <div>
                  <div style={{fontWeight:700,color:"var(--teal)",marginBottom:12,fontSize:13}}>
                    Editing [{e.code}]
                  </div>
                  {["name","total","rate"].map(k=>(
                    <div key={k} style={{marginBottom:8}}>
                      <label style={LST}>{k==="rate"?"Rate/hr (0=FREE)":k.charAt(0).toUpperCase()+k.slice(1)}</label>
                      <input type={k==="name"?"text":"number"} value={editing[k]}
                        onChange={ev=>setEditing(p=>({...p,[k]:k==="name"?ev.target.value:Number(ev.target.value)}))}
                        style={{...IST}}/>
                    </div>
                  ))}
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <Btn small onClick={()=>save(editing)}>Save</Btn>
                    <Btn small secondary onClick={()=>setEditing(null)}>Cancel</Btn>
                  </div>
                </div>
              ):(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{fontSize:11,color:"var(--muted)",fontWeight:600,letterSpacing:".06em"}}>[{e.code}]</div>
                      <div style={{fontWeight:700,color:"var(--navy)",fontSize:14}}>{e.name}</div>
                      <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
                        {e.rate===0?"FREE":`$${e.rate}/hr`} · {e.cat}
                      </div>
                    </div>
                    {currentUser.role==="boss"&&(
                      <button onClick={()=>setEditing({...e})}
                        style={{background:"none",border:"1px solid var(--border)",
                          borderRadius:8,padding:"4px 10px",fontSize:11,
                          color:"var(--teal-d)",cursor:"pointer"}}>Edit</button>
                    )}
                  </div>
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                      <span>Available: <strong>{avail}</strong> / {e.total}</span>
                      <span style={{fontWeight:700,color:avail===0?"var(--coral)":avail<=2?"var(--gold)":"var(--green)"}}>
                        {avail===0?"FULL":avail<=2?"LOW":"OK"}
                      </span>
                    </div>
                    <div style={{height:6,background:"var(--border)",borderRadius:3,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct*100}%`,transition:"width .4s",
                        background:avail===0?"var(--coral)":avail<=2?"var(--gold)":"var(--teal)"}}/>
                    </div>
                  </div>
                  {e.condition&&<div style={{fontSize:11,color:"var(--muted)"}}>Condition: {e.condition}</div>}
                </>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   REPORTS TAB
═══════════════════════════════════════════ */
function ReportTab({bookings,equipment,payments}){
  const[range,setRange]=useState("today");
  const now=new Date();
  function inRange(b){
    const d=new Date(b.date+"T12:00");
    if(range==="today")return b.date===todayStr();
    if(range==="week")return(now-d)<=7*864e5;
    if(range==="month")return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  }
  const filtered=bookings.filter(inRange);
  const active=filtered.filter(b=>b.status!=="cancelled");
  const revenue=active.reduce((s,b)=>s+b.total,0);
  const byEquip={};
  active.forEach(b=>{
    if(!byEquip[b.equipName])byEquip[b.equipName]={count:0,rev:0};
    byEquip[b.equipName].count+=b.qty;
    byEquip[b.equipName].rev+=b.total;
  });

  function Stat({label,val,color}){
    return(
      <div style={{background:"#fff",borderRadius:14,padding:18,
        borderLeft:`4px solid ${color}`,boxShadow:"0 2px 8px rgba(11,30,45,.05)"}}>
        <div style={{fontFamily:"var(--serif)",fontSize:24,fontWeight:600,color}}>{val}</div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:4,textTransform:"uppercase",
          letterSpacing:".05em"}}>{label}</div>
      </div>
    );
  }
  function downloadCSV(){
    const rows=[["ID","Customer","Phone","Equipment","Qty","Date","Start","End","Duration",
      "Total","Payment","Status","Waiver","ID Photo","Booked By"],
      ...bookings.map(b=>[b.id,b.firstName+" "+b.lastName,b.phone,b.equipName,
        b.qty,b.date,b.startTime,b.endTime,b.duration,b.total,b.payment,b.status,
        b.waiverSigned?"Yes":"No",b.idPhotoName?"Yes":"No",b.bookedBy||""])];
    const csv=rows.map(r=>r.join(",")).join("\n");
    const a=document.createElement("a");
    a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download=`APR_Report_${todayStr()}.csv`;a.click();
  }

  return(
    <div className="anim">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h2 style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--navy)"}}>Reports</h2>
        <div style={{display:"flex",gap:8}}>
          <select value={range} onChange={e=>setRange(e.target.value)}
            style={{...IST,width:"auto",padding:"8px 12px"}}>
            <option value="today">Today</option>
            <option value="week">Last 7 days</option>
            <option value="month">This month</option>
            <option value="all">All time</option>
          </select>
          <button onClick={downloadCSV} style={{padding:"8px 14px",borderRadius:10,
            border:"1px solid var(--border)",background:"#fff",fontSize:13,
            fontWeight:600,color:"var(--teal-d)",cursor:"pointer"}}>
            📥 Export CSV
          </button>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:12,marginBottom:20}}>
        <Stat label="Revenue" val={fmt(revenue)} color="var(--teal)"/>
        <Stat label="Bookings" val={filtered.length} color="var(--navy)"/>
        <Stat label="Active" val={filtered.filter(b=>b.status==="checked-in").length} color="var(--gold)"/>
        <Stat label="Returned" val={filtered.filter(b=>b.status==="returned").length} color="var(--green)"/>
        <Stat label="Cancelled" val={filtered.filter(b=>b.status==="cancelled").length} color="var(--coral)"/>
      </div>
      <div style={{background:"#fff",borderRadius:14,padding:20,
        boxShadow:"0 2px 8px rgba(11,30,45,.05)"}}>
        <div style={{fontWeight:700,color:"var(--navy)",marginBottom:12,fontSize:14}}>
          Revenue by Equipment
        </div>
        {Object.keys(byEquip).length===0
          ?<div style={{color:"var(--muted)",fontSize:13}}>No data for this period.</div>
          :Object.entries(byEquip).sort((a,b)=>b[1].rev-a[1].rev).map(([name,d])=>(
            <div key={name} style={{display:"flex",justifyContent:"space-between",
              padding:"9px 0",borderBottom:"1px solid var(--border)",fontSize:13}}>
              <span style={{color:"var(--text)"}}>{name} ({d.count} rented)</span>
              <span style={{fontWeight:600,color:"var(--teal-d)"}}>{fmt(d.rev)}</span>
            </div>
          ))}
      </div>
    </div>
  );
}

function RentalsTab({bookings,setModal}){

    const map={confirmed:{bg:"#FFF3D6",col:"#92670A"},
      "checked-in":{bg:"#DCEEFF",col:"#0A5FA8"},
      returned:{bg:"#E3F5EC",col:"#0A6A3A"},
      cancelled:{bg:"#FBE0E0",col:"#A8200A"}};

          <option value="checked-in">Active</option>
          <option value="returned">Returned</option>

      </div>
      {list.length===0&&<div style={{textAlign:"center",padding:48,color:"var(--muted)"}}>No rentals found.</div>}
      {list.map(b=>{
        const st=statusStyle(b.status);
        return(

              <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>
                #{b.id} · {fmtDate(b.date)} · {b.startTime}–{b.endTime} · {fmt(b.total)}

              {b.idPhotoData&&<span title="ID on file" style={{fontSize:14,color:"var(--teal)"}}>🪪</span>}
              <span style={{padding:"4px 10px",borderRadius:20,fontSize:11,

/* ═══════════════════════════════════════════
   STAFF MANAGEMENT (Boss only)
═══════════════════════════════════════════ */
function StaffTab({users,setUsers,toast}){
  const[newName,setNewName]=useState("");
  const[newPin,setNewPin]=useState("");
  const[newRole,setNewRole]=useState("staff");
  const[newWA,setNewWA]=useState("");

  function addUser(){
    if(!newName.trim())return toast("Name required","error");
    if(newPin.length<4)return toast("PIN must be 4-6 digits","error");
    if(!/^\d+$/.test(newPin))return toast("PIN must be digits only","error");
    const id="user_"+Date.now();
    setUsers(p=>[...p,{id,name:newName.trim(),role:newRole,pin:newPin,whatsapp:newWA,active:true}]);
    setNewName("");setNewPin("");setNewWA("");
    toast("Staff member added ✅");
  }
  function toggleUser(id){
    setUsers(p=>p.map(u=>u.id===id?{...u,active:!u.active}:u));
  }
  function removeUser(id){
    if(!confirm("Remove this staff member?"))return;
    setUsers(p=>p.filter(u=>u.id!==id));
    toast("Removed","warn");
  }
  function updatePin(id,pin){
    if(pin.length<4||!/^\d+$/.test(pin))return toast("PIN: 4-6 digits only","error");
    setUsers(p=>p.map(u=>u.id===id?{...u,pin}:u));
    toast("PIN updated ✅");
  }

  return(
    <div className="anim">
      <h2 style={{fontFamily:"var(--serif)",fontSize:22,color:"var(--navy)",marginBottom:16}}>
        Staff Management
      </h2>

      {/* Current staff */}
      {users.map(u=>(
        <div key={u.id} style={{background:"#fff",borderRadius:14,padding:18,
          marginBottom:12,border:"1px solid var(--border)",
          boxShadow:"0 1px 6px rgba(11,30,45,.05)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontWeight:700,color:"var(--navy)",fontSize:14}}>{u.name}</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
                Role: <span style={{
                  background:u.role==="boss"?"var(--gold)":"var(--teal-l)",
                  color:u.role==="boss"?"var(--navy)":"var(--teal-d)",
                  padding:"2px 8px",borderRadius:20,fontWeight:600,fontSize:11
                }}>{u.role}</span>
                {u.whatsapp&&<span style={{marginLeft:10}}>📱 {u.whatsapp}</span>}
              </div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:12,fontWeight:600,
                color:u.active?"var(--green)":"var(--muted)"}}>
                {u.active?"● Active":"○ Inactive"}
              </span>
              <button onClick={()=>toggleUser(u.id)} style={{padding:"5px 12px",
                borderRadius:8,border:"1px solid var(--border)",background:"#fff",
                fontSize:11,fontWeight:600,cursor:"pointer",color:"var(--teal-d)"}}>
                {u.active?"Deactivate":"Activate"}
              </button>
              {u.id!=="boss"&&(
                <button onClick={()=>removeUser(u.id)} style={{padding:"5px 12px",
                  borderRadius:8,border:"none",background:"var(--coral)",
                  color:"#fff",fontSize:11,fontWeight:600,cursor:"pointer"}}>
                  Remove
                </button>
              )}
            </div>
          </div>
          {/* PIN change */}
          <div style={{marginTop:12,display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}>
              <label style={LST}>Change PIN</label>
              <input type="password" placeholder="New PIN (4-6 digits)"
                maxLength={6} style={{...IST}}
                onKeyDown={e=>{if(e.key==="Enter")updatePin(u.id,e.target.value);}}
                id={`pin-${u.id}`}/>
            </div>
            <button onClick={()=>{
              const el=document.getElementById(`pin-${u.id}`);
              if(el)updatePin(u.id,el.value);
            }} style={{padding:"11px 16px",borderRadius:10,border:"none",
              background:"var(--teal)",color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>
              Update
            </button>
          </div>
        </div>
      ))}

      {/* Add new */}
      <div style={{background:"var(--teal-l)",borderRadius:14,padding:20,
        border:"1px solid var(--border)",marginTop:8}}>
        <div style={{fontWeight:700,color:"var(--navy)",marginBottom:14,fontSize:14}}>
          ➕ Add Staff Member
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <Field label="Full Name" value={newName} onChange={setNewName} required/>
          <div>
            <label style={LST}>Role</label>
            <select value={newRole} onChange={e=>setNewRole(e.target.value)} style={IST}>
              <option value="staff">Staff (Booking + Check-in)</option>
              <option value="boss">Boss (Full Access)</option>
            </select>
          </div>
          <div>
            <label style={LST}>PIN (4-6 digits) <span style={{color:"var(--coral)"}}>*</span></label>
            <input type="password" value={newPin} onChange={e=>setNewPin(e.target.value.replace(/[^0-9]/g,""))}
              maxLength={6} placeholder="e.g. 1234" style={IST}/>
          </div>
          <Field label="WhatsApp Number" value={newWA} onChange={setNewWA} placeholder="17844961234"/>
        </div>
        <div style={{marginTop:14}}>
          <Btn onClick={addUser}>Add Staff Member</Btn>
        </div>
      </div>
    </div>
  );
}

  );

/* ═══════════════════════════════════════════
   MAIN APP
═══════════════════════════════════════════ */
function App(){
  const[users,setUsers]=useState(()=>ls("apr_users",DEFAULT_USERS));
  const[currentUser,setCurrentUser]=useState(null);
  const[bookings,setBookings]=useState(()=>ls("apr_bookings",[]));
  const[equipment,setEquipment]=useState(()=>ls("apr_equip",INIT_EQUIP));
  const[payments,setPayments]=useState(()=>ls("apr_payments",INIT_PAYMENTS));
  const[tab,setTab]=useState("book");
  const[toasts,setToasts]=useState([]);
  const[modal,setModal]=useState(null);

  // Persist everything
  useEffect(()=>lsSet("apr_users",users),[users]);
  useEffect(()=>lsSet("apr_bookings",bookings),[bookings]);
  useEffect(()=>lsSet("apr_equip",equipment),[equipment]);
  useEffect(()=>lsSet("apr_payments",payments),[payments]);

  function toast(msg,type="ok"){
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  }
  function dismiss(id){setToasts(p=>p.filter(t=>t.id!==id));}

  function addBooking(b){
    setBookings(p=>[b,...p]);
    setEquipment(p=>p.map(e=>e.id===b.equipId?{...e,booked:(e.booked||0)+b.qty}:e));
  }
  function checkIn(id){
    setBookings(p=>p.map(b=>b.id===id?{...b,status:"checked-in",checkInTime:nowTime()}:b));
    toast("Checked in ✅");
  }
  function checkOut(id){
    const b=bookings.find(x=>x.id===id);
    setBookings(p=>p.map(bk=>bk.id===id?{...bk,status:"returned",returnTime:nowTime()}:bk));
    if(b)setEquipment(p=>p.map(e=>e.id===b.equipId?{...e,booked:Math.max(0,(e.booked||0)-b.qty)}:e));
    toast("Equipment returned ✅");
  }
  function cancelBooking(id){
    const b=bookings.find(x=>x.id===id);
    setBookings(p=>p.map(bk=>bk.id===id?{...bk,status:"cancelled"}:bk));
    if(b)setEquipment(p=>p.map(e=>e.id===b.equipId?{...e,booked:Math.max(0,(e.booked||0)-b.qty)}:e));
    toast("Cancelled","warn");
  }

  // Low-stock warnings
  useEffect(()=>{
    equipment.forEach(e=>{
      const avail=e.total-(e.booked||0);
      if(avail===1)toast(`⚠️ Low stock: ${e.name} — 1 left!`,"warn");
      if(avail===0)toast(`❌ ${e.name} is fully booked!`,"error");
    });
  },[equipment]);

  if(!currentUser){
    return <LoginScreen users={users} onLogin={u=>{setCurrentUser(u);setTab("book");}}/>;
  }

  const bossUser=users.find(u=>u.role==="boss");
  const isBoss=currentUser.role==="boss";

  // Tabs by role
  const allTabs=[
    {id:"book",label:"New Booking",icon:"📋"},
    {id:"checkin",label:"Check-In",icon:"✅"},
    {id:"equip",label:"Equipment",icon:"🏄"},
    {id:"reports",label:"Reports",icon:"📊",bossOnly:true},
    {id:"rentals",label:"Rentals",icon:"📁"},
    {id:"staff",label:"Staff",icon:"👥",bossOnly:true},
    {id:"settings",label:"Settings",icon:"⚙️",bossOnly:true},
  ];
  const tabs=allTabs.filter(t=>!t.bossOnly||isBoss);

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      {/* HEADER */}
      <header style={{background:`linear-gradient(180deg,var(--navy2),var(--navy))`,
        position:"sticky",top:0,zIndex:40,
        borderBottom:"1px solid rgba(251,198,44,.15)"}}>
        <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 16px 0",
          paddingTop:`max(12px,env(safe-area-inset-top))`}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <img src={LOGO_SRC} alt="APR" style={{width:42,height:42,borderRadius:"50%",
              objectFit:"cover",border:"2px solid var(--gold)",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"var(--serif)",fontSize:17,fontWeight:600,
                color:"#fff",letterSpacing:".01em",lineHeight:1.1}}>
                Aquatic Paradise Rentals
              </div>
              <div style={{fontSize:9.5,color:"var(--gold)",textTransform:"uppercase",
                letterSpacing:".12em",marginTop:2}}>
                {isBoss?"Boss · Full Access":"Staff · "+currentUser.name}
              </div>
            </div>
            {/* Logout */}
            <button onClick={()=>{setCurrentUser(null);setTab("book");}}
              style={{padding:"7px 14px",borderRadius:9,border:"1px solid rgba(255,255,255,.15)",
                background:"rgba(255,255,255,.06)",color:"rgba(255,255,255,.75)",
                fontSize:12,fontWeight:600,cursor:"pointer"}}>
              Log out
            </button>
          </div>
          {/* Tab bar */}
          <div style={{display:"flex",gap:2,overflowX:"auto",paddingBottom:0}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"10px 14px",border:"none",cursor:"pointer",
                borderRadius:"8px 8px 0 0",whiteSpace:"nowrap",
                background:tab===t.id?"var(--bg)":"transparent",
                color:tab===t.id?"var(--teal)":"rgba(255,255,255,.65)",
                fontFamily:"var(--sans)",fontSize:12,fontWeight:tab===t.id?700:400,
                transition:"all .15s",
              }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>
        </div>
      </header>

      {/* CONTENT */}
      <main style={{maxWidth:1100,margin:"0 auto",padding:"24px 16px 80px"}}>
        {/* Notification banner for staff */}
        {!isBoss&&(
          <div style={{background:"var(--teal-l)",border:"1px solid var(--teal)",
            borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:12,
            color:"var(--teal-d)",display:"flex",alignItems:"center",gap:8}}>
            👤 Logged in as <strong>{currentUser.name}</strong> (Staff) · 
            Bookings will auto-notify the boss via WhatsApp
          </div>
        )}

        {tab==="book"&&<BookingTab equipment={equipment} onBook={addBooking}
          toast={toast} payments={payments.filter(p=>p.active)}
          currentUser={currentUser} bossWhatsapp={bossUser?.whatsapp||BIZ.whatsapp}/>}
        {tab==="checkin"&&<CheckInTab bookings={bookings} onCheckIn={checkIn}
          onCheckOut={checkOut} onCancel={cancelBooking} setModal={setModal} payments={payments}/>}
        {tab==="equip"&&<EquipTab equipment={equipment} setEquipment={setEquipment}
          toast={toast} currentUser={currentUser}/>}
        {isBoss&&tab==="reports"&&<ReportTab bookings={bookings}
          equipment={equipment} payments={payments}/>}
        {tab==="rentals"&&<RentalsTab bookings={bookings} setModal={setModal}/>}
        {isBoss&&tab==="staff"&&<StaffTab users={users} setUsers={setUsers} toast={toast}/>}
        {isBoss&&tab==="settings"&&<SettingsTab payments={payments}
          setPayments={setPayments} toast={toast}/>}
      </main>

      {/* MODALS */}
      {modal?.type==="detail"&&(
        <Modal title={`Booking #${modal.data.id}`} onClose={()=>setModal(null)} wide>
          <BookingDetailModal booking={modal.data} payments={payments} onClose={()=>setModal(null)}/>
        </Modal>
      )}

      <Toasts toasts={toasts} dismiss={dismiss}/>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
