<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>APR Dispatch</title>
<style>
:root{ --teal:#03939E; --gold:#FBC62C; --coral:#E0351B; --navy:#0B1E2D; }
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--navy);color:#fff;min-height:100vh}
header{background:linear-gradient(135deg,var(--teal),#027480);padding:16px 18px;text-align:center}
header h1{font-size:1.1rem}
header p{font-size:0.72rem;color:rgba(255,255,255,0.7);margin-top:2px}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;padding:20px}
.pin-dots{display:flex;gap:12px;margin-bottom:10px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.3)}
.pin-dot.filled{background:var(--gold);border-color:var(--gold)}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:12px}
.pin-btn{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,0.08);color:#fff;border:none;font-size:1.3rem;font-weight:700;cursor:pointer}
.pin-btn:active{background:var(--teal)}
#app{display:none;padding:14px}
.card{background:#162030;border-radius:14px;padding:14px;margin-bottom:12px;border-left:4px solid var(--gold)}
.card.done{border-left-color:var(--teal);opacity:0.7}
.ref{font-weight:800;font-size:0.85rem;color:var(--gold)}
.name{font-weight:700;font-size:1rem;margin:4px 0}
.detail{font-size:0.8rem;color:rgba(255,255,255,0.65);margin-bottom:3px}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;text-transform:uppercase;margin-top:6px}
.status-pill.pending{background:rgba(251,198,44,0.2);color:var(--gold)}
.status-pill.confirmed{background:rgba(3,147,158,0.3);color:#5fd0da}
.status-pill.done{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5)}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{flex:1;min-width:90px;padding:9px;border-radius:8px;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;color:#fff}
.btn.confirm{background:var(--teal)}
.btn.done-btn{background:var(--gold);color:var(--navy)}
.btn.wa{background:#25D366;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,0.35);font-size:0.85rem}
.refresh{width:100%;padding:10px;background:rgba(255,255,255,0.08);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:0.82rem;margin-bottom:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#162030;color:#fff;padding:10px 18px;border-radius:8px;font-size:0.8rem;z-index:999;display:none}
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <h1>🚚 APR Dispatch</h1>
  <p style="font-size:0.78rem;color:rgba(255,255,255,0.5)">Enter your PIN</p>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBackspace()">⌫</button>
  </div>
</div>

<div id="app">
  <header>
    <h1>🚚 Aquatic Paradise Dispatch</h1>
    <p>Name · gear · time · location only — no pricing shown here</p>
  </header>
  <div style="padding:14px">
    <button class="refresh" onclick="fetchDispatch()">🔄 Refresh</button>
    <div id="list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbzr1KHela518-pgQ3dJyvv77tm9z2JWo_TTovRNys6RwYNBIUfdyJKxGF_ETzNk9m47Ww/exec';
// Weaker dispatch-only token — cannot read pricing/revenue endpoints.
// Must match STAFF_TOKEN in Code.gs.
const STAFF_TOKEN = 'Dsp_7Kq2mNw94RfL';
const DISPATCH_PIN = '5150';
const FEEDBACK_BASE_URL = 'https://aquaticparadiserentals.com/feedback.html';
let pinBuffer = '';
let bookings = [];
let drivers = [];

function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  renderPinDots();
  if (pinBuffer.length === 4) checkPin();
}
function pinClear() { pinBuffer=''; renderPinDots(); }
function pinBackspace() { pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); }
function renderPinDots() {
  document.getElementById('pinDots').innerHTML = Array.from({length:4}, (_,i)=>
    `<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`).join('');
}
function checkPin() {
  if (pinBuffer === DISPATCH_PIN) {
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('app').style.display='block';
    fetchDispatch();
  } else {
    showToast('Wrong PIN');
    setTimeout(()=>{ pinBuffer=''; renderPinDots(); }, 400);
  }
}
renderPinDots();

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}
function escapeHtml(val) {
  const s = (val===undefined||val===null)?'':String(val);
  return s.replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function notifyLink(wa, msg) {
  const digits = String(wa||'').replace(/\D/g,'');
  return `https://wa.me/${encodeURIComponent(digits)}?text=${encodeURIComponent(msg||'')}`;
}

async function fetchDispatch() {
  try {
    const [bkRes, drvRes] = await Promise.all([
      fetch(BACKEND+'?action=getDispatchBookings&limit=50&token='+encodeURIComponent(STAFF_TOKEN),{signal:AbortSignal.timeout(10000)}),
      fetch(BACKEND+'?action=getDrivers&token='+encodeURIComponent(STAFF_TOKEN),{signal:AbortSignal.timeout(10000)})
    ]);
    const bkData = await bkRes.json();
    const drvData = await drvRes.json();
    bookings = (bkData && bkData.ok && Array.isArray(bkData.bookings)) ? bkData.bookings : [];
    drivers = (drvData && drvData.ok && Array.isArray(drvData.drivers)) ? drvData.drivers : [];
    render();
  } catch (err) {
    showToast('Could not load: '+err.message);
  }
}

function render() {
  const el = document.getElementById('list');
  if (!bookings.length) { el.innerHTML = '<div class="empty">No bookings right now.</div>'; return; }
  el.innerHTML = bookings.map(b => {
    const ref = escapeHtml(b.ref);
    const status = b.status && b.status !== 'N/A' ? b.status : 'pending';
    const phone = String(b.phone||'').replace(/\D/g,'');
    const hasLoc = b.driverLat && b.driverLat!=='N/A' && b.driverLng && b.driverLng!=='N/A';
    const mapUrl = hasLoc ? `https://www.google.com/maps?q=${encodeURIComponent(b.driverLat)},${encodeURIComponent(b.driverLng)}` : '';
    const feedbackUrl = FEEDBACK_BASE_URL + '?ref=' + encodeURIComponent(b.ref);
    const feedbackMsg = `Thanks for renting with Aquatic Paradise! We'd love your feedback: ${feedbackUrl}`;
    return `<div class="card ${status==='done'?'done':''}">
      <div class="ref">${ref}</div>
      <div class="name">${escapeHtml(b.fname)} ${escapeHtml(b.lname)}</div>
      <div class="detail">📱 ${escapeHtml(b.phone)}</div>
      <div class="detail">🏄 ${escapeHtml(b.gear)} · ${escapeHtml(b.duration)}</div>
      <div class="detail">📅 ${escapeHtml(b.datetime)}</div>
      <div class="detail">👥 Group: ${escapeHtml(b.groupSize)}${b.kidsCount && b.kidsCount!=='N/A' && Number(b.kidsCount)>0 ? ' ('+escapeHtml(b.kidsCount)+' kid(s) — kid-size life jacket)' : ''}</div>
      ${b.notes && b.notes!=='N/A' ? `<div class="detail">📝 ${escapeHtml(b.notes)}</div>` : ''}
      ${hasLoc ? `<div class="detail">📍 Last location: <a href="${mapUrl}" target="_blank" style="color:#5fd0da">view on map</a> (${escapeHtml(b.driverLocAt)})</div>` : ''}
      <span class="status-pill ${status}">${status}</span>
      <div class="actions">
        ${status!=='confirmed'&&status!=='done'?`<button class="btn confirm" data-ref="${ref}" onclick="setStatus(this.dataset.ref,'confirmed')">✅ Confirm</button>`:''}
        ${status!=='done'?`<button class="btn done-btn" data-ref="${ref}" onclick="setStatus(this.dataset.ref,'done')">☑ Done</button>`:''}
        ${status!=='done'?`<button class="btn" style="background:#3a4a5c" data-ref="${ref}" onclick="shareLocation(this.dataset.ref)">📍 Share Location</button>`:''}
        ${phone?`<a class="btn wa" href="https://wa.me/${encodeURIComponent(phone)}" target="_blank">💬 Guest</a>`:''}
        ${status==='done'&&phone?`<a class="btn wa" style="background:#FBC62C;color:#0B1E2D" href="https://wa.me/${encodeURIComponent(phone)}?text=${encodeURIComponent(feedbackMsg)}" target="_blank">⭐ Ask Feedback</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function shareLocation(ref) {
  if (!navigator.geolocation) { showToast('Location not supported on this device'); return; }
  showToast('Getting location…');
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const res = await fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({
        action:'update_driver_location', token:STAFF_TOKEN, ref,
        lat: pos.coords.latitude, lng: pos.coords.longitude
      }),signal:AbortSignal.timeout(15000)});
      const data = await res.json();
      if (!data || !data.ok) throw new Error((data&&data.error)||'Failed');
      await fetchDispatch();
      showToast('Location shared ✅');
    } catch (err) {
      showToast('Could not share location: '+err.message);
    }
  }, err => {
    showToast('Location denied or unavailable');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

async function setStatus(ref, status) {
  try {
    const res = await fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({
      action:'update_status', token:STAFF_TOKEN, ref, status
    }),signal:AbortSignal.timeout(15000)});
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data&&data.error)||'Failed');
    await fetchDispatch();
    showToast('Updated ✅');
  } catch (err) {
    showToast('Could not update: '+err.message);
  }
}
</script>
</body>
</html>
