<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>APR Dispatch</title>
<link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png"/>
<link rel="apple-touch-icon" href="/icons/icon-180.png"/>
<style>
/* Retinted to match the aquatic-platform SaaS design system and admin.html
   (Stripe/Linear register: navy + ocean teal, flat surfaces, thin borders,
   no gradients). Class names kept identical — only values changed. */
:root{
  --teal:#4FB8CC; --gold:#F0A93B; --coral:#F0655F; --navy:#070E1A;
  --surface:#111A2C; --bg:#0B1220; --line:#232E44; --muted:#93A0B5; --ink:#E7EBF3;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh}
header{background:var(--navy);border-bottom:1px solid var(--line);padding:16px 18px;text-align:center}
header h1{font-size:1.1rem}
header p{font-size:0.72rem;color:var(--muted);margin-top:2px}
.pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;padding:20px}
.pin-dots{display:flex;gap:12px;margin-bottom:10px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--line);border:2px solid var(--line)}
.pin-dot.filled{background:var(--teal);border-color:var(--teal)}
.pin-pad{display:grid;grid-template-columns:repeat(3,64px);gap:12px}
.pin-btn{width:64px;height:64px;border-radius:8px;background:var(--surface);color:var(--ink);border:1px solid var(--line);font-size:1.3rem;font-weight:700;cursor:pointer}
.pin-btn:active{background:var(--teal)}
#app{display:none;padding:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius, 8px);padding:14px;margin-bottom:12px;border-left:3px solid var(--gold)}
.card.done{border-left-color:var(--teal);opacity:0.7}
.ref{font-weight:800;font-size:0.85rem;color:var(--teal)}
.name{font-weight:700;font-size:1rem;margin:4px 0}
.detail{font-size:0.8rem;color:var(--muted);margin-bottom:3px}
.status-pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.68rem;font-weight:700;text-transform:uppercase;margin-top:6px}
.status-pill.pending{background:rgba(240,169,59,0.18);color:var(--gold)}
.status-pill.confirmed{background:rgba(79,184,204,0.18);color:var(--teal)}
.status-pill.delivering{background:rgba(240,101,95,0.18);color:var(--coral)}
.status-pill.done{background:var(--line);color:var(--muted)}
.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{flex:1;min-width:90px;padding:9px;border-radius:8px;border:none;font-weight:700;font-size:0.78rem;cursor:pointer;color:#fff}
.btn.confirm{background:var(--teal)}
.btn.done-btn{background:var(--gold);color:var(--navy)}
.btn.wa{background:#25D366;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:0.85rem}
.refresh{width:100%;padding:10px;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:8px;font-weight:700;font-size:0.82rem;margin-bottom:14px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--line);color:var(--ink);padding:10px 18px;border-radius:8px;font-size:0.8rem;z-index:999;display:none}
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <h1>🚚 APR Dispatch</h1>
  <p style="font-size:0.78rem;color:var(--muted)">Enter your PIN</p>
  <div class="pin-dots" id="pinDots"></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinPress('1')">1</button>
    <button class="pin-btn" onclick="pinPress('2')">2</button>
    <button class="pin-btn" onclick="pinPress('3')">3</button>
    <button class="pin-btn" onclick="pinPress('4')">4</button>
    <button class="pin-btn" onclick="pinPress('5')">5</button>
    <button class="pin-btn" onclick="pinPress('6')">6</button>
    <button class="pin-btn" onclick="pinPress('7')">7</button>
    <button class="pin-btn" onclick="pinPress('8')">8</button>
    <button class="pin-btn" onclick="pinPress('9')">9</button>
    <button class="pin-btn" onclick="pinClear()">CLR</button>
    <button class="pin-btn" onclick="pinPress('0')">0</button>
    <button class="pin-btn" onclick="pinBackspace()">⌫</button>
  </div>
  <a href="https://wa.me/17844963447?text=Hi%2C%20I%20forgot%20my%20dispatch%20PIN%20and%20need%20it%20reset." target="_blank" style="font-size:0.72rem;color:var(--muted);text-decoration:underline">Forgot PIN? Message for a reset</a>
</div>

<div id="app">
  <header>
    <h1>🚚 Aquatic Paradise Dispatch</h1>
    <p>Name · gear · time · location only — no pricing shown here</p>
  </header>
  <div style="padding:14px">
    <button class="refresh" onclick="fetchDispatch()">🔄 Refresh</button>
    <div id="list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="offline-queue.js"></script>
<script>
const BACKEND = 'https://script.google.com/macros/s/AKfycbzr1KHela518-pgQ3dJyvv77tm9z2JWo_TTovRNys6RwYNBIUfdyJKxGF_ETzNk9m47Ww/exec';
// No longer a hardcoded constant — this page's source used to hand out the
// real token to anyone who viewed it, regardless of the PIN. Now it's null
// until the PIN is verified server-side, and only ever lives in memory for
// this tab's session.
let STAFF_TOKEN = null;
// aquaticparadiserentals.com doesn't resolve yet (no DNS/CNAME set up — see
// OPERATIONS.md §9) — using that here sent customers to a dead domain.
// This is the real live URL until the custom domain is actually wired up.
const FEEDBACK_BASE_URL = 'https://aquaticparadiserentals-web.github.io/aquaticparadiserentals-web/feedback.html';
let pinBuffer = '';
let bookings = [];
let drivers = [];

function pinPress(d) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += d;
  renderPinDots();
  if (pinBuffer.length === 4) checkPin();
}
function pinClear() { pinBuffer=''; renderPinDots(); }
function pinBackspace() { pinBuffer = pinBuffer.slice(0,-1); renderPinDots(); }
function renderPinDots() {
  document.getElementById('pinDots').innerHTML = Array.from({length:4}, (_,i)=>
    `<div class="pin-dot ${i<pinBuffer.length?'filled':''}"></div>`).join('');
}
async function checkPin() {
  let result = null;
  try {
    const res = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'verifyPin', role: 'staff', pin: pinBuffer }),
      signal: AbortSignal.timeout(10000)
    });
    result = res.ok ? await res.json() : null;
  } catch (err) {
    console.error('checkPin failed:', err);
    result = null; // fail-safe: any error during auth = access denied
  }
  if (result && result.ok && result.token) {
    STAFF_TOKEN = result.token;
    document.getElementById('pinScreen').style.display='none';
    document.getElementById('app').style.display='block';
    fetchDispatch();
  } else {
    showToast('Wrong PIN');
    setTimeout(()=>{ pinBuffer=''; renderPinDots(); }, 400);
  }
}
renderPinDots();

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  setTimeout(()=>t.style.display='none', 2500);
}
function escapeHtml(val) {
  const s = (val===undefined||val===null)?'':String(val);
  return s.replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function notifyLink(wa, msg) {
  const digits = String(wa||'').replace(/\D/g,'');
  return `https://wa.me/${encodeURIComponent(digits)}?text=${encodeURIComponent(msg||'')}`;
}

async function fetchDispatch() {
  try {
    const [bkRes, drvRes] = await Promise.all([
      fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getDispatchBookings',token:STAFF_TOKEN,limit:50}),signal:AbortSignal.timeout(10000)}),
      fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:'getDrivers',token:STAFF_TOKEN}),signal:AbortSignal.timeout(10000)})
    ]);
    const bkData = await bkRes.json();
    const drvData = await drvRes.json();
    bookings = (bkData && bkData.ok && Array.isArray(bkData.bookings)) ? bkData.bookings : [];
    drivers = (drvData && drvData.ok && Array.isArray(drvData.drivers)) ? drvData.drivers : [];
    render();
    ensureTracking();
  } catch (err) {
    showToast('Could not load: '+err.message);
  }
}

// ── AUTO GPS TRACKING while a delivery is in progress ──
// Foreground-only by design (Page Visibility API pauses/resumes) — a real
// background tracker needs OS-level location permission this PWA doesn't
// have. Trade-off accepted: only works while the driver's screen is on and
// this tab is open, but that beats the old one-shot-per-tap model.
let deliveringRefs = new Set();
let trackIntervals = {};
const TRACK_INTERVAL_MS = 60000;

function ensureTracking() {
  bookings.forEach(b => {
    if (!b || !b.ref) return;
    const status = b.status && b.status !== 'N/A' ? b.status : 'pending';
    if (status === 'delivering') startAutoTracking(b.ref);
    else stopAutoTracking(b.ref);
  });
}
function startAutoTracking(ref) {
  if (deliveringRefs.has(ref)) return;
  deliveringRefs.add(ref);
  if (!document.hidden) armInterval(ref);
}
function stopAutoTracking(ref) {
  deliveringRefs.delete(ref);
  disarmInterval(ref);
}
function armInterval(ref) {
  if (trackIntervals[ref]) return;
  shareLocationSilent(ref);
  trackIntervals[ref] = setInterval(() => shareLocationSilent(ref), TRACK_INTERVAL_MS);
}
function disarmInterval(ref) {
  if (trackIntervals[ref]) { clearInterval(trackIntervals[ref]); delete trackIntervals[ref]; }
}
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    Object.keys(trackIntervals).forEach(disarmInterval);
  } else {
    deliveringRefs.forEach(armInterval);
  }
});
function shareLocationSilent(ref) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      // dedupeKey means if several of these stack up offline, only the
      // most recent position for this booking survives in the queue —
      // no value replaying 10 stale pings once back online.
      await AQPQueue.queueOrSend(BACKEND, {
        action:'update_driver_location', token:STAFF_TOKEN, ref,
        lat: pos.coords.latitude, lng: pos.coords.longitude
      }, { dedupeKey: 'gps:' + ref, timeoutMs: 15000 });
    } catch (err) { /* silent — next tick retries, no toast spam every minute */ }
  }, () => { /* denied/unavailable — silent, driver already granted it once for manual share */ }, { enableHighAccuracy: true, timeout: 10000 });
}

function render() {
  const el = document.getElementById('list');
  if (!bookings.length) { el.innerHTML = '<div class="empty">No bookings right now.</div>'; return; }
  el.innerHTML = bookings.map(b => {
    const ref = escapeHtml(b.ref);
    const status = b.status && b.status !== 'N/A' ? b.status : 'pending';
    const phone = String(b.phone||'').replace(/\D/g,'');
    const hasLoc = b.driverLat && b.driverLat!=='N/A' && b.driverLng && b.driverLng!=='N/A';
    const mapUrl = hasLoc ? `https://www.google.com/maps?q=${encodeURIComponent(b.driverLat)},${encodeURIComponent(b.driverLng)}` : '';
    const feedbackUrl = FEEDBACK_BASE_URL + '?ref=' + encodeURIComponent(b.ref);
    const feedbackMsg = `Thanks for renting with Aquatic Paradise! We'd love your feedback: ${feedbackUrl}`;
    return `<div class="card ${status==='done'?'done':''}">
      <div class="ref">${ref}</div>
      <div class="name">${escapeHtml(b.fname)} ${escapeHtml(b.lname)}</div>
      <div class="detail">📱 ${escapeHtml(b.phone)}</div>
      <div class="detail">🏄 ${escapeHtml(b.gear)} · ${escapeHtml(b.duration)}</div>
      <div class="detail">📅 ${escapeHtml(b.datetime)}</div>
      <div class="detail">👥 Group: ${escapeHtml(b.groupSize)}${b.kidsCount && b.kidsCount!=='N/A' && Number(b.kidsCount)>0 ? ' ('+escapeHtml(b.kidsCount)+' kid(s) — kid-size life jacket)' : ''}</div>
      ${b.notes && b.notes!=='N/A' ? `<div class="detail">📝 ${escapeHtml(b.notes)}</div>` : ''}
      ${hasLoc ? `<div class="detail">📍 Last location: <a href="${mapUrl}" target="_blank" style="color:#5fd0da">view on map</a> (${escapeHtml(b.driverLocAt)})</div>` : ''}
      ${status==='delivering' ? `<div class="detail" style="color:#ff8a70">🛰️ Auto-sharing location every minute while this tab stays open</div>` : ''}
      <span class="status-pill ${status}">${status}</span>
      <div class="actions">
        ${status==='pending'?`<button class="btn confirm" data-ref="${ref}" onclick="setStatus(this.dataset.ref,'confirmed')">✅ Confirm</button>`:''}
        ${status==='confirmed'?`<button class="btn" style="background:var(--coral)" data-ref="${ref}" onclick="setStatus(this.dataset.ref,'delivering')">🚚 Start Delivery</button>`:''}
        ${status!=='done'?`<button class="btn done-btn" data-ref="${ref}" onclick="setStatus(this.dataset.ref,'done')">☑ Done</button>`:''}
        ${status!=='done'?`<button class="btn" style="background:#3a4a5c" data-ref="${ref}" onclick="shareLocation(this.dataset.ref)">📍 Share Location</button>`:''}
        ${phone?`<a class="btn wa" href="https://wa.me/${encodeURIComponent(phone)}" target="_blank">💬 Guest</a>`:''}
        ${status==='done'&&phone?`<a class="btn wa" style="background:var(--gold);color:var(--navy)" href="https://wa.me/${encodeURIComponent(phone)}?text=${encodeURIComponent(feedbackMsg)}" target="_blank">⭐ Ask Feedback</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function shareLocation(ref) {
  if (!navigator.geolocation) { showToast('Location not supported on this device'); return; }
  showToast('Getting location…');
  navigator.geolocation.getCurrentPosition(async pos => {
    try {
      const data = await AQPQueue.queueOrSend(BACKEND, {
        action:'update_driver_location', token:STAFF_TOKEN, ref,
        lat: pos.coords.latitude, lng: pos.coords.longitude
      }, { dedupeKey: 'gps:' + ref, timeoutMs: 15000 });
      if (!data || !data.ok) throw new Error((data&&data.error)||'Failed');
      if (data.queued) {
        showToast('Saved — will send once you\'re back online 📶');
      } else {
        await fetchDispatch();
        showToast('Location shared ✅');
      }
    } catch (err) {
      showToast('Could not share location: '+err.message);
    }
  }, err => {
    showToast('Location denied or unavailable');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

async function setStatus(ref, status) {
  try {
    const res = await fetch(BACKEND,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({
      action:'update_status', token:STAFF_TOKEN, ref, status
    }),signal:AbortSignal.timeout(15000)});
    const data = await res.json();
    if (!data || !data.ok) throw new Error((data&&data.error)||'Failed');
    await fetchDispatch();
    showToast('Updated ✅');
  } catch (err) {
    showToast('Could not update: '+err.message);
  }
}
</script>
</body>
</html>
